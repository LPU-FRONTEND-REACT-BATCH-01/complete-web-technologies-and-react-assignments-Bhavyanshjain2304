<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table with Audio and Video</title>
</head>
<body>
    <table border="2" cellpadding="10" cellspacing="0">
        <tr>
            <td>Title</td>
            <td>Image</td>
            <td>Audio</td>
            <td>Video</td>
        </tr>
        <tr>
            <td>Dog</td>
            <td><img src="dog.jpg" alt="Dog"></td>
            <td><audio controls><source src="dog.mp3" type="audio/mpeg"></audio></td>
            <td><video controls><source src="dog.mp4" type="video/mp4"></video  ></td>
        </tr>
    </table>
    
</body>
</html>
