<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NavBar</title>
    <style>
        nav{
            background-color: black;
            height: 50px;
            display: flex;
            align-items: center;
        }
        nav ul{
          
            display: flex;
            margin: 0;
            padding: 0;
        }
        nav ul li{
            margin-right: 20px;
        }
        nav ul li a{
            color: white;
            text-decoration: none;
            font-size: 18px;
        }

    </style>
</head>
<body>
    <nav>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Services</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>
    
</body>
</html>
