<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selectors</title>
    <style>
        ul li :nth-of-type(2){
           background-color: blue;
        }
        ul li:first-of-type{
            background-color: yellow;
        }

        ul h1:first-of-type{
            background-color: red;
        }
        
        ul h1:last-of-type{
            background-color: green;
        }

        ul h1:last-of-type ~ li:nth-child(2n){
            background-color: orange;
        }

        
 

    </style>
</head>

<body>
    <ul>
        <h1>List of Bikes</h1>
        <li>Harley Davidson</li>
        <li>Yamaha</li>
        <li>Honda</li>
        <li>Ducati</li>


        <h1>List of Cars</h1>
        <li>Toyota</li>
        <li>Honda</li>
        <li>Ford</li>

        <h1>Natural Numbers</h1>
        <li>1</li>
        <li>2</li>
        <li>3</li>
        <li>4</li>
        <li>5</li>
        <li>6</li>
        <li>7</li>
        <li>8</li>
        <li>9</li>
    </ul>
</body>
</html>
