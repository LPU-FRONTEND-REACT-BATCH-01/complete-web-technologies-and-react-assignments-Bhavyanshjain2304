<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>My Webpage</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f0f0f0;
      color: #333;
      padding: 20px;
    }

    h1 { color: tomato; }
    h2 { color: steelblue; }

    table {
      border-collapse: collapse;
      width: 60%;
    }

    th, td {
      border: 1px solid #999;
      padding: 8px 12px;
      text-align: left;
    }

    th { background-color: steelblue; color: white; }

    input, select, textarea {
      display: block;
      margin: 8px 0;
      padding: 6px;
      width: 250px;
    }

    button {
      padding: 8px 20px;
      background-color: tomato;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h1>Welcome to My Page</h1>
  <p>This is a simple webpage made with <b>HTML</b> and <b>CSS</b>.</p>

  <h2>My Hobbies</h2>
  <ul>
    <li>Reading</li>
    <li>Coding</li>
    <li>Gaming</li>
  </ul>

  <h2>Top 3 Languages</h2>
  <ol>
    <li>HTML</li>
    <li>CSS</li>
    <li>JavaScript</li>
  </ol>

  <h2>Course Table</h2>
  <table>
    <tr>
      <th>Course</th>
      <th>Duration</th>
    </tr>
    <tr>
      <td>HTML & CSS</td>
      <td>2 Weeks</td>
    </tr>
    <tr>
      <td>JavaScript</td>
      <td>4 Weeks</td>
    </tr>
    <tr>
      <td>React</td>
      <td>6 Weeks</td>
    </tr>
  </table>

  <h2>Contact Me</h2>
  <form>
    <label>Name:</label>
    <input type="text" placeholder="Your name" />

    <label>Email:</label>
    <input type="email" placeholder="Your email" />

    <label>Course:</label>
    <select>
        <option value="" disabled selected>Select a course</option>
      <option>HTML & CSS</option>
      <option>JavaScript</option>
      <option>React</option>
    </select>

    <label>Message:</label>
    <textarea rows="3"></textarea>

    <button type="submit">Submit</button>
  </form>

</body>
</html>
