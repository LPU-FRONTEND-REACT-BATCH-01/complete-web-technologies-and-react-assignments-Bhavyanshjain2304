<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>React Hero Clone</title>
  <style>
    @font-face {
      font-family: "Optimistic Display";
      src: url("https://react.dev/fonts/Optimistic_Display_W_Md.woff2") format("woff2");
      font-weight: 500;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: "Optimistic Display";
      src: url("https://react.dev/fonts/Optimistic_Display_W_SBd.woff2") format("woff2");
      font-weight: 600;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: "Optimistic Display";
      src: url("https://react.dev/fonts/Optimistic_Display_W_Bd.woff2") format("woff2");
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: "Optimistic Text";
      src: url("https://react.dev/fonts/Optimistic_Text_W_Rg.woff2") format("woff2");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: "Optimistic Text";
      src: url("https://react.dev/fonts/Optimistic_Text_W_Md.woff2") format("woff2");
      font-weight: 500;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: "Optimistic Text";
      src: url("https://react.dev/fonts/Optimistic_Text_W_Bd.woff2") format("woff2");
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --bg: #23272f;
      --surface: #343a46;
      --surface-deep: #23272f;
      --text: #f3f5f7;
      --muted: #99a1b3;
      --brand: #58c4dc;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Optimistic Text", "Segoe UI", sans-serif;
      overflow: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button,
    kbd {
      font: inherit;
    }

    .page-shell {
      min-width: 1440px;
      height: 640px;
      min-height: 640px;
      overflow: hidden;
    }

    .topbar {
      display: grid;
      grid-template-columns: auto minmax(520px, 1fr) auto;
      align-items: center;
      gap: 18px;
      padding: 13px 24px 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--brand);
    }

    .version {
      margin-top: -1px;
      color: #9ca3b6;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: -0.01em;
    }

    .react-logo {
      display: block;
      color: var(--brand);
    }

    .react-logo-small {
      width: 49px;
      height: 44px;
    }

    .searchbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      height: 48px;
      padding: 0 12px 0 17px;
      border: 1px solid rgba(86, 95, 110, 0.58);
      border-radius: 999px;
      background: #343a46;
      color: var(--muted);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.02);
    }

    .search-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .search-icon {
      width: 20px;
      height: 20px;
      color: #99a1b3;
      flex: 0 0 auto;
    }

    .search-label {
      font-size: 16px;
      font-weight: 500;
      letter-spacing: -0.01em;
    }

    .search-shortcuts {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .shortcut {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 31px;
      height: 30px;
      padding: 0 10px;
      border: 1px solid rgba(90, 98, 113, 0.65);
      border-radius: 10px;
      background: var(--surface-deep);
      color: #d0d5df;
      font-family: "Optimistic Text", "Segoe UI", sans-serif;
      font-size: 14px;
      font-weight: 500;
      line-height: 1;
    }

    .shortcut-wide {
      min-width: 50px;
    }

    .nav-cluster {
      display: flex;
      align-items: center;
      gap: 34px;
    }

    .main-nav {
      display: flex;
      align-items: center;
      gap: 38px;
      margin-right: 5px;
    }

    .main-nav a {
      color: #f3f5f7;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.02em;
      text-shadow: 0 1px 0 rgba(0, 0, 0, 0.35);
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .icon-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 42px;
      height: 42px;
      border: 0;
      padding: 0;
      background: transparent;
      color: #f4f5f7;
    }

    .action-icon {
      width: 28px;
      height: 28px;
    }

    .github-icon {
      width: 24px;
      height: 24px;
    }

    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 142px;
      text-align: center;
    }

    .react-logo-hero {
      width: 118px;
      height: 104px;
    }

    .hero h1 {
      margin: 29px 0 0;
      font-family: "Optimistic Display", "Optimistic Text", "Segoe UI", sans-serif;
      font-size: 64px;
      font-weight: 600;
      letter-spacing: -0.04em;
      line-height: 0.98;
      text-shadow: 0 1px 0 rgba(0, 0, 0, 0.58);
    }

    .hero p {
      margin: 20px 0 0;
      max-width: 980px;
      font-family: "Optimistic Display", "Optimistic Text", "Segoe UI", sans-serif;
      font-size: 36px;
      font-weight: 500;
      letter-spacing: -0.03em;
      line-height: 1.12;
      text-shadow: 0 1px 0 rgba(0, 0, 0, 0.56);
    }

    .hero-actions {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 31px;
    }

    .cta {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 62px;
      border-radius: 999px;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .cta-primary {
      min-width: 186px;
      padding: 0 30px;
      background: var(--brand);
      color: #21313c;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.16);
    }

    .cta-secondary {
      min-width: 210px;
      padding: 0 30px;
      border: 1px solid rgba(93, 102, 118, 0.85);
      background: rgba(35, 39, 47, 0.15);
      color: #f3f5f7;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.02);
    }

    @media (max-width: 1500px) {
      .page-shell {
        min-width: 1280px;
      }

      .topbar {
        grid-template-columns: auto minmax(420px, 1fr) auto;
      }

      .main-nav {
        gap: 28px;
      }

      .hero p {
        max-width: 880px;
        font-size: 34px;
      }
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <header class="topbar">
      <div class="brand">
        <a class="brand-link" href="#" aria-label="React home">
          <svg
            class="react-logo react-logo-small"
            viewBox="-10.5 -9.45 21 18.9"
            aria-hidden="true"
          >
            <circle cx="0" cy="0" r="2" fill="currentColor"></circle>
            <g stroke="currentColor" stroke-width="1" fill="none">
              <ellipse rx="10" ry="4.5"></ellipse>
              <ellipse rx="10" ry="4.5" transform="rotate(60)"></ellipse>
              <ellipse rx="10" ry="4.5" transform="rotate(120)"></ellipse>
            </g>
          </svg>
        </a>
        <span class="version">v19.2</span>
      </div>

      <button class="searchbar" type="button" aria-label="Search">
        <span class="search-left">
          <svg class="search-icon" viewBox="0 0 20 20" aria-hidden="true">
            <path
              d="M14.386 14.386l4.0877 4.0877-4.0877-4.0877c-2.9418 2.9419-7.7115 2.9419-10.6533 0-2.9419-2.9418-2.9419-7.7115 0-10.6533 2.9418-2.9419 7.7115-2.9419 10.6533 0 2.9419 2.9418 2.9419 7.7115 0 10.6533z"
              fill="none"
              stroke="currentColor"
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
            />
          </svg>
          <span class="search-label">Search</span>
        </span>
        <span class="search-shortcuts" aria-hidden="true">
          <kbd class="shortcut shortcut-wide">Ctrl</kbd>
          <kbd class="shortcut">K</kbd>
        </span>
      </button>

      <div class="nav-cluster">
        <nav class="main-nav" aria-label="Primary">
          <a href="#">Learn</a>
          <a href="#">Reference</a>
          <a href="#">Community</a>
          <a href="#">Blog</a>
        </nav>

        <div class="actions" aria-label="Quick actions">
          <button class="icon-button" type="button" aria-label="Theme">
            <svg class="action-icon" viewBox="0 0 32 32" aria-hidden="true">
              <circle cx="16" cy="16" r="5.6" fill="none" stroke="currentColor" stroke-width="1.8" />
              <g stroke="currentColor" stroke-linecap="round" stroke-width="1.8">
                <path d="M16 3.8v4.3" />
                <path d="M16 23.9v4.3" />
                <path d="M3.8 16h4.3" />
                <path d="M23.9 16h4.3" />
                <path d="M7.37 7.37l3.04 3.04" />
                <path d="M21.59 21.59l3.04 3.04" />
                <path d="M24.63 7.37l-3.04 3.04" />
                <path d="M10.41 21.59l-3.04 3.04" />
              </g>
            </svg>
          </button>

          <button class="icon-button" type="button" aria-label="Language">
            <svg class="action-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M4 5h11M9.5 5c0 5-2.3 8.5-6 10.5M7 9c1.4 1.9 3.5 3.6 6 4.9M14 19l4.8-11L23 19M15.6 15.3h6.4"
                fill="none"
                stroke="currentColor"
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="1.8"
              />
            </svg>
          </button>

          <button class="icon-button" type="button" aria-label="GitHub">
            <svg class="action-icon github-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M12 .7a11.3 11.3 0 0 0-3.57 22.02c.56.1.76-.24.76-.54l-.02-2.1c-3.08.67-3.73-1.3-3.73-1.3-.5-1.26-1.22-1.6-1.22-1.6-1-.68.08-.67.08-.67 1.1.08 1.67 1.14 1.67 1.14.98 1.67 2.57 1.19 3.2.9.1-.71.39-1.19.7-1.46-2.46-.28-5.04-1.23-5.04-5.47 0-1.21.43-2.2 1.15-2.98-.12-.28-.5-1.4.1-2.92 0 0 .94-.3 3.08 1.14a10.7 10.7 0 0 1 5.61 0c2.13-1.45 3.07-1.14 3.07-1.14.61 1.52.23 2.64.11 2.92.72.78 1.15 1.77 1.15 2.98 0 4.25-2.58 5.18-5.05 5.46.4.34.75 1 .75 2.03l-.01 3.01c0 .3.2.64.77.54A11.3 11.3 0 0 0 12 .7Z"
                fill="currentColor"
              />
            </svg>
          </button>
        </div>
      </div>
    </header>

    <main class="hero">
      <svg
        class="react-logo react-logo-hero"
        viewBox="-10.5 -9.45 21 18.9"
        aria-hidden="true"
      >
        <circle cx="0" cy="0" r="2" fill="currentColor"></circle>
        <g stroke="currentColor" stroke-width="1" fill="none">
          <ellipse rx="10" ry="4.5"></ellipse>
          <ellipse rx="10" ry="4.5" transform="rotate(60)"></ellipse>
          <ellipse rx="10" ry="4.5" transform="rotate(120)"></ellipse>
        </g>
      </svg>

      <h1>React</h1>
      <p>The library for web and native user interfaces</p>

      <div class="hero-actions">
        <a class="cta cta-primary" href="#">Learn React</a>
        <a class="cta cta-secondary" href="#">API Reference</a>
      </div>
    </main>
  </div>
</body>
</html>
