<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Quote Design</title>

<style>
  body {
    margin: 0;
    height: 100vh;
    text-align: center;
    background: #f5f5f5;
    font-family: 'Playfair Display', serif;
  }

  .container {
    text-align: center;
    background: white;
    padding: 50px;
    width: 70%;
    box-shadow: 0 0 10px black;
  }

  .quote {
    font-size: 32px;
    color: black;
    line-height: 1.6;
  }

  .quote::first-letter {
    font-size: 60px;
    color: purple; 
    font-weight: bold;
  }

  .author {
    margin-top: 30px;
    font-size: 20px;
    color: #777;
    text-decoration: underline;
  }


.container:hover .quote {
  font-size: 36px;       
  letter-spacing: 1px;  
  line-height: 1.8;      
}

.container:hover .author{
    color: purple;
}
</style>

</head>
<body>

<div class="container">
  <p class="quote">
    The only way to do great work is<br>
    to love what you do.
  </p>

  <p class="author">— Steve Jobs</p>
</div>

</body>
</html>
