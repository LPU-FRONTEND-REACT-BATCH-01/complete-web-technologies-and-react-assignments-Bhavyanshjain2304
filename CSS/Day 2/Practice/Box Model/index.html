<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Sizing</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 30px;
        }

        .container {
            width: 400px;
            background: grey;
            margin-bottom: 30px;
        }

        .box {
            width: 200px;
            padding: 20px;
            border: 5px solid black;
            color: white;
            font-size: 14px;
        }

        .content-box {
            box-sizing: content-box;
            background: red;
        }

        .border-box {
            box-sizing: border-box;
            background: blue;
        }
    </style>
</head>
<body>

    <h2>content-box</h2>
    <div class="container">
        <div class="box content-box">Box 1</div>
        <div class="box content-box">Box 2</div>
    </div>

    <h2>border-box</h2>
    <div class="container">
        <div class="box border-box">Box 1</div>
        <div class="box border-box">Box 2</div>
    </div>

</body>
</html>
